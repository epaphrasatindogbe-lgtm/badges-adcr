<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Badge ADCR</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    padding: 20px;
    text-align: center;
    color: white;

    /* IMAGE DE FOND + FLOU */
    background: url("https://images.unsplash.com/photo-1503428593586-e225b39bddfe") no-repeat center/cover;
}

body::before{
    content:"";
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    backdrop-filter: blur(5px);
    z-index:-1;
}

input{
    padding:10px;
    margin:10px;
    width:250px;
    border-radius:5px;
    border:none;
}

button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#00c9a7;
    color:white;
    font-size:16px;
}

#badge{
    margin-top:20px;
    display:none;
}

canvas{
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<h1>Générateur de Badge ADCR</h1>

<input type="text" id="nom" placeholder="Nom"><br>
<input type="text" id="prenom" placeholder="Prénom"><br>
<input type="text" id="eglise" placeholder="Église"><br>

<button onclick="genererBadge()">Créer Badge</button>
<button onclick="telecharger()">Télécharger</button>

<div id="badge">
    <canvas id="canvas" width="450" height="300"></canvas>
</div>

<script>

let numero = 1;

function formatNumero(num){
    return String(num).padStart(3, '0'); // 001, 002...
}

function genererBadge(){

    const nom = document.getElementById("nom").value;
    const prenom = document.getElementById("prenom").value;
    const eglise = document.getElementById("eglise").value;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    // Fond badge
    ctx.fillStyle = "#1e3c72";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    // Titre principal
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Assemblée des Disciples de Christ Ressuscité (ADCR)", 225, 30);

    ctx.font = "bold 18px Arial";
    ctx.fillText("Badge de la Convention", 225, 60);

    // Infos utilisateur
    ctx.textAlign = "left";
    ctx.font = "16px Arial";
    ctx.fillText("Nom : " + nom, 20, 110);
    ctx.fillText("Prénom : " + prenom, 20, 140);
    ctx.fillText("Église : " + eglise, 20, 170);

    // Numéro badge
    ctx.fillText("N° Badge : " + formatNumero(numero), 20, 200);

    // Paiement
    ctx.fillStyle = "#00ffcc";
    ctx.font = "16px Arial";
    ctx.fillText("Payé 500 XOF", 300, 270);

    // Verset
    ctx.fillStyle = "white";
    ctx.font = "bold 10px Arial";
    ctx.textAlign = "center";
    ctx.fillText("Demeurez en moi, et je demeurerai en vous.(Jean 15:4)", 225, 230);

    document.getElementById("badge").style.display = "block";
}

function telecharger(){
    const canvas = document.getElementById("canvas");
    const lien = document.createElement("a");
    lien.download = "badge_" + formatNumero(numero) + ".png";
    lien.href = canvas.toDataURL();
    lien.click();

    numero++; // 🔥 incrément après téléchargement
}

</script>

</body>
</html>
